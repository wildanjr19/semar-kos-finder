name: Deploy Staging to VPS

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging images
        run: |
          docker compose --profile staging build
          docker compose --profile staging push

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: http://${{ secrets.STAGING_SSH_HOST }}:3003
    timeout-minutes: 10

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          STAGING_GOOGLE_MAPS_API_KEY: ${{ secrets.STAGING_GOOGLE_MAPS_API_KEY }}
          STAGING_JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          STAGING_ADMIN_PASSWORD_BCRYPT: ${{ secrets.STAGING_ADMIN_PASSWORD_BCRYPT }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: STAGING_GOOGLE_MAPS_API_KEY,STAGING_JWT_SECRET,STAGING_ADMIN_PASSWORD_BCRYPT
          script_stop: true
          script: |
            set -euo pipefail

            cd /home/ubuntu/semar-kos-finder
            git pull origin staging

            cat > .env.staging << 'EOF'
            GOOGLE_MAPS_API_KEY=${STAGING_GOOGLE_MAPS_API_KEY}
            NEXT_TELEMETRY_DISABLED=1
            NODE_ENV=production
            API_INTERNAL_URL=http://backend_staging:8000
            MONGO_URL=mongodb://mongodb_staging:27017/semar_kos_staging
            JWT_SECRET=${STAGING_JWT_SECRET}
            JWT_EXPIRE_MINUTES=60
            ADMIN_USERNAME=admin
            ADMIN_PASSWORD_BCRYPT=${STAGING_ADMIN_PASSWORD_BCRYPT}
            EOF

            docker compose --profile staging pull
            docker compose --profile staging up -d

            docker image prune -af --filter "until=24h"

      - name: Wait for services
        run: sleep 15

      - name: Health check staging web
        run: |
          curl -sf http://${{ secrets.STAGING_SSH_HOST }}:3003 || exit 1
