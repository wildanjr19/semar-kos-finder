name: Deploy Staging to VPS

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging images
        run: |
          docker compose --profile staging build
          docker compose --profile staging push

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: staging
    timeout-minutes: 10

    steps:
      - name: Checkout compose.yaml only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            compose.yaml
          sparse-checkout-cone-mode: false

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p "${{ vars.APP_DIR || '/opt/semar-kos-staging' }}"

      - name: Copy compose.yaml to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "compose.yaml"
          target: "${{ vars.APP_DIR || '/opt/semar-kos-staging' }}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD_BCRYPT: ${{ secrets.ADMIN_PASSWORD_BCRYPT }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GOOGLE_MAPS_API_KEY,JWT_SECRET,ADMIN_PASSWORD_BCRYPT,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ vars.APP_DIR || '/opt/semar-kos-staging' }}"
            cd "${APP_DIR}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cat > .env.staging << 'EOF'
            GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
            NEXT_TELEMETRY_DISABLED=1
            NODE_ENV=production
            API_INTERNAL_URL=http://backend_staging:8000
            MONGO_URL=mongodb://mongodb_staging:27017/semar_kos_staging
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRE_MINUTES=60
            ADMIN_USERNAME=admin
            ADMIN_PASSWORD_BCRYPT=${ADMIN_PASSWORD_BCRYPT}
            EOF

            docker compose -f compose.yaml --profile staging pull
            docker compose -f compose.yaml --profile staging up -d

            docker image prune -af --filter "until=24h"
            docker logout ghcr.io

      - name: Wait for services
        run: sleep 15

      - name: Health check staging web
        run: |
          curl -sf http://${{ secrets.SSH_HOST }}:${{ vars.WEB_PORT }} || exit 1
