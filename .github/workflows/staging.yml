name: Deploy Staging to VPS

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [web_staging, backend_staging, admin_staging]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create placeholder env file
        run: touch .env.staging

      - name: Build and push staging image
        run: |
          docker compose --profile staging build ${{ matrix.service }}
          docker compose --profile staging push ${{ matrix.service }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: staging
    timeout-minutes: 10

    steps:
      - name: Checkout compose.yaml only
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            compose.yaml
          sparse-checkout-cone-mode: false

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p "${{ vars.APP_DIR || '/opt/semar-kos-staging' }}"

      - name: Copy compose.yaml to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "compose.yaml"
          target: "${{ vars.APP_DIR || '/opt/semar-kos-staging' }}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          WEB_PORT: ${{ vars.WEB_PORT }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          ADMIN_PORT: ${{ vars.ADMIN_PORT }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD_BCRYPT: ${{ secrets.ADMIN_PASSWORD_BCRYPT }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: WEB_PORT,BACKEND_PORT,ADMIN_PORT,GOOGLE_MAPS_API_KEY,JWT_SECRET,ADMIN_PASSWORD_BCRYPT,GHCR_TOKEN
          script: |
            set -euo pipefail

            APP_DIR="${{ vars.APP_DIR || '/opt/semar-kos-staging' }}"
            cd "${APP_DIR}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cat > .env.staging << 'EOF'
            GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
            NEXT_TELEMETRY_DISABLED=1
            NODE_ENV=production
            API_INTERNAL_URL=http://backend_staging:8000
            MONGO_URL=mongodb://mongodb_staging:27017/semar_kos_staging
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRE_MINUTES=60
            ADMIN_USERNAME=admin
            ADMIN_PASSWORD_BCRYPT=${ADMIN_PASSWORD_BCRYPT}
            EOF

            docker compose -f compose.yaml --profile staging pull
            docker compose -f compose.yaml --profile staging up -d

            docker image prune -a --force --filter "until=24h"
            docker logout ghcr.io

      - name: Health check staging web
        run: |
          for i in {1..12}; do
            curl -sf https://${{ secrets.STAGING_DOMAIN }} && exit 0
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          exit 1
