name: Deploy Unskosfinder to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Masuk ke direktori project
            cd /home/ubuntu/semar-kos-finder

            # Ambil kode terbaru
            git pull origin main

            # Masuk ke folder frontend (sesuaikan jika folder bernama 'web' atau 'frontend')
            cd frontend

            # Install dependencies
            npm install

            # Build project
            # .next otomatis tertimpa saat build, tidak wajib rm -rf tapi boleh dipertahankan
            npm run build
            
            # Cek apakah proses sudah ada di PM2
            # Jika ada, restart. Jika tidak ada, start baru.
            pm2 describe semarkosfinder > /dev/null
            if [ $? -eq 0 ]; then
              echo "Aplikasi ditemukan, melakukan restart..."
              pm2 restart semarkosfinder
            else
              echo "Aplikasi baru, melakukan start..."
              pm2 start npm --name "semarkosfinder" -- start -- -p 3002
            fi

            # Simpan konfigurasi PM2
            pm2 save

            echo "Deployment selesai. Status PM2:"
            pm2 list