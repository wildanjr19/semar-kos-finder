name: Deploy Production to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [web_prod, backend_prod, admin_prod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create placeholder env file
        run: touch .env.production

      - name: Build and push production image
        run: |
          docker compose --profile production build ${{ matrix.service }}
          docker compose --profile production push ${{ matrix.service }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: production
    timeout-minutes: 10

    steps:
      - name: Checkout compose.yaml only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            compose.yaml
          sparse-checkout-cone-mode: false

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p "${{ vars.APP_DIR || '/opt/semar-kos-prod' }}"

      - name: Copy compose.yaml to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "compose.yaml"
          target: "${{ vars.APP_DIR || '/opt/semar-kos-prod' }}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          WEB_PORT: ${{ vars.WEB_PORT }}
          ADMIN_PORT: ${{ vars.ADMIN_PORT }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD_BCRYPT: ${{ secrets.ADMIN_PASSWORD_BCRYPT }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: WEB_PORT,ADMIN_PORT,GOOGLE_MAPS_API_KEY,JWT_SECRET,ADMIN_PASSWORD_BCRYPT,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ vars.APP_DIR || '/opt/semar-kos-prod' }}"
            cd "${APP_DIR}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cat > .env.production << 'EOF'
            GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
            NEXT_TELEMETRY_DISABLED=1
            NODE_ENV=production
            API_INTERNAL_URL=http://backend_prod:8000
            MONGO_URL=mongodb://mongodb_prod:27017/semar_kos_prod
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRE_MINUTES=60
            ADMIN_USERNAME=admin
            ADMIN_PASSWORD_BCRYPT=${ADMIN_PASSWORD_BCRYPT}
            EOF

            docker compose -f compose.yaml --profile production pull
            docker compose -f compose.yaml --profile production up -d

            docker image prune -af --filter "until=24h"
            docker logout ghcr.io

      - name: Wait for services
        run: sleep 15

      - name: Health check production web
        run: |
          curl -sf https://${{ secrets.PRODUCTION_DOMAIN }} || exit 1
